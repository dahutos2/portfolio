name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore: [
      '**.md',
      'portfolio.config.yml',
      '.github/scripts/**.py',
      '.github/workflows/**.yml',
      'public/data/**'
    ]
  workflow_dispatch:
  workflow_run:
    workflows: ["Fetch portfolio data"]
    types: [completed]

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # コード取得
      - uses: actions/checkout@v4

      # .tool-versions と package.json の整合性を検証し、pnpm を有効化する
      - uses: ./.github/actions/setup-pnpm

      # 依存インストール
      - run: pnpm install --frozen-lockfile

      # 既知の高危険以上の脆弱性を検出したら停止する
      - run: pnpm audit --audit-level high

      # Vite ビルド
      - run: pnpm run build

      # アーティファクトを Pages 用にアップロード
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages:    write
      id-token: write
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
